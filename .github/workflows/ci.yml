name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-checks:
    name: Python Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync Python workspace
        run: uv sync

      - name: Run isolation test (efofx-shared must not import fastapi/motor/uvicorn)
        run: cd packages/efofx-shared && uv run pytest tests/test_isolation.py -v

      - name: Run full pytest suite (efofx-estimate)
        run: cd apps/efofx-estimate && uv run pytest -v

  typescript-checks:
    name: TypeScript Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      - name: Type-check @efofx/ui shared package
        run: cd packages/efofx-ui && npx tsc --noEmit

      - name: Build efofx-widget
        run: cd apps/efofx-widget && npm run build

      - name: Build efofx-dashboard
        run: cd apps/efofx-dashboard && npm run build
